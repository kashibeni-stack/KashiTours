                        <div className="relative h-48 overflow-hidden bg-gray-200">
                          <img 
                            src={attr.img} 
                            alt={attr.name} 
                            onError={(e) => { e.target.onerror = null; e.target.src = `https://loremflickr.com/800/600/prague,travel?lock=${attr.id}`; }}
                            className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" 
                          />
                          <div className="absolute top-3 right-3 bg-white/90 backdrop-blur text-gray-800 text-xs font-bold px-2.5 py-1 rounded-full shadow">
                            {attr.cat}
                          </div>
                        </div>
                        
                        <div className="p-5 flex-grow flex flex-col">
                          <h3 className="font-bold text-lg text-gray-900 leading-tight mb-2">{attr.name}</h3>
                          <div className="flex items-center mb-3">
                            {[...Array(5)].map((_, i) => (
                              <i key={i} className={`fa-star text-sm ${i < attr.rating ? 'fas text-yellow-400' : 'far text-gray-300'}`}></i>
                            ))}
                          </div>
                          <p className="text-gray-600 text-sm mb-4 line-clamp-2">{attr.desc}</p>
                          <div className="mt-auto space-y-1">
                            <div className="flex items-center text-gray-500 text-xs">
                              <i className="far fa-clock ml-1.5 text-gray-400"></i>
                              <span>{attr.time}</span>
                            </div>
                            <div className="flex items-center text-gray-500 text-xs">
                              <i className="fas fa-ticket-alt ml-1.5 text-gray-400"></i>
                              <span className="truncate">{attr.price}</span>
                            </div>
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>
                ) : (
                  <div className="text-center py-20">
                    <i className="fas fa-search text-gray-300 text-5xl mb-4"></i>
                    <h3 className="text-xl font-bold text-gray-600">לא נמצאו תוצאות</h3>
                  </div>
                )}
              </main>

              {/* Modal */}
              {selectedAttr && (
                <div className="fixed inset-0 bg-black/60 z-50 flex justify-center items-center p-4 backdrop-blur-sm" onClick={() => setSelectedAttr(null)}>
                  <div className="bg-white rounded-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto shadow-2xl relative" onClick={e => e.stopPropagation()}>
                    <button onClick={() => setSelectedAttr(null)} className="absolute top-4 left-4 bg-black/40 hover:bg-black/60 text-white rounded-full w-8 h-8 flex items-center justify-center z-10">
                      <i className="fas fa-times"></i>
                    </button>
                    
                    <div className="h-64 relative">
                      <img 
                        src={selectedAttr.img} 
                        alt={selectedAttr.name} 
                        onError={(e) => { e.target.onerror = null; e.target.src = `https://loremflickr.com/800/600/prague,travel?lock=${selectedAttr.id}`; }}
                        className="w-full h-full object-cover" 
                      />
                      <div className="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent"></div>
                      <div className="absolute bottom-4 right-6 left-6 text-white">
                        <span className="inline-block bg-yellow-500 text-yellow-950 text-xs font-bold px-2 py-1 rounded mb-2">{selectedAttr.cat}</span>
                        <h2 className="text-2xl font-bold">{selectedAttr.name}</h2>
                      </div>
                    </div>

                    <div className="p-6">
                      <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6 bg-gray-50 p-4 rounded-xl border border-gray-100">
                        <div className="flex items-start gap-3">
                          <i className="far fa-calendar-alt text-blue-500 mt-1"></i>
                          <div>
                            <span className="block text-xs font-bold text-gray-500 uppercase">גילאים מומלצים</span>
                            <span className="text-gray-800 text-sm">{selectedAttr.age}</span>
                          </div>
                        </div>
                        <div className="flex items-start gap-3">
                          <i className="far fa-clock text-blue-500 mt-1"></i>
                          <div>
                            <span className="block text-xs font-bold text-gray-500 uppercase">משך זמן</span>
                            <span className="text-gray-800 text-sm">{selectedAttr.time}</span>
                          </div>
                        </div>
                        <div className="flex items-start gap-3">
                          <i className="fas fa-tram text-blue-500 mt-1"></i>
                          <div>
                            <span className="block text-xs font-bold text-gray-500 uppercase">הגעה</span>
                            <span className="text-gray-800 text-sm">{selectedAttr.trans}</span>
                          </div>
                        </div>
                        <div className="flex items-start gap-3">
                          <i className="fas fa-ticket-alt text-blue-500 mt-1"></i>
                          <div>
                            <span className="block text-xs font-bold text-gray-500 uppercase">מחיר</span>
                            <span className="text-gray-800 text-sm">{selectedAttr.price}</span>
                          </div>
                        </div>
                      </div>

                      <div className="mb-8">
                        <h4 className="font-bold text-lg mb-2 text-gray-900 flex items-center gap-2">
                          <i className="fas fa-info-circle text-yellow-500"></i> על האטרקציה
                        </h4>
                        <p className="text-gray-700 leading-relaxed">{selectedAttr.desc}</p>
                      </div>

                      <div className="flex justify-end gap-3 pt-4 border-t border-gray-100">
                        <a href={selectedAttr.link} target="_blank" className="flex items-center gap-2 bg-gray-100 hover:bg-gray-200 text-gray-800 px-4 py-2.5 rounded-lg font-medium">
                          <i className="fas fa-external-link-alt"></i> אתר רשמי
                        </a>
                        <a href={selectedAttr.link} target="_blank" className="flex items-center gap-2 bg-yellow-400 hover:bg-yellow-500 text-yellow-950 px-6 py-2.5 rounded-lg font-bold">
                          <i className="fas fa-ticket-alt"></i> הזמנת כרטיסים
                        </a>
                      </div>
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
