    // --- מערכת הניווט ב-Vanilla JS ---
    let currentView = { page: 'home', chapterId: null, sectionId: null };

    function goBack() {
      if (currentView.page === 'section') {
        currentView = { page: 'chapter', chapterId: currentView.chapterId, sectionId: null };
      } else if (currentView.page === 'chapter') {
        currentView = { page: 'home', chapterId: null, sectionId: null };
      }
      render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function navigateToChapter(chapterId) {
      currentView = { page: 'chapter', chapterId: chapterId, sectionId: null };
      render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function navigateToSection(chapterId, sectionId) {
      currentView = { page: 'section', chapterId: chapterId, sectionId: sectionId };
      render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function renderBreadcrumbs() {
      const bc = document.getElementById('breadcrumbs');
      if (currentView.page === 'home') {
        bc.classList.add('hidden');
      } else {
        bc.classList.remove('hidden');
        bc.classList.add('flex');
        
        let html = `<span class="cursor-pointer hover:text-white" onclick="currentView={page:'home', chapterId:null, sectionId:null}; render();">ראשי</span>`;
        
        if (currentView.chapterId) {
          const c = bridgeData.find(c => c.id === currentView.chapterId);
          html += ` <span class="mx-1">/</span> <span class="cursor-pointer hover:text-white truncate" onclick="currentView={page:'chapter', chapterId:'${c.id}', sectionId:null}; render();">${c.title}</span>`;
          
          if (currentView.sectionId) {
             const s = c.sections.find(s => s.id === currentView.sectionId);
             html += ` <span class="mx-1">/</span> <span class="text-white font-bold truncate max-w-[200px]">${s.title}</span>`;
          }
        }
        bc.innerHTML = html;
      }
    }

    function render() {
      const app = document.getElementById('app');
      const backBtn = document.getElementById('backBtn');
      const headerTitle = document.getElementById('headerTitle');
      
      renderBreadcrumbs();

      if (currentView.page === 'home') {
        backBtn.classList.add('hidden');
        headerTitle.innerText = "ברידג' - דף מרכז";
        
        let html = `<div class="space-y-4 animate-fade-in">`;
        bridgeData.forEach(c => {
          html += `
            <button onclick="navigateToChapter('${c.id}')" class="w-full mb-3 p-4 bg-white shadow-sm border border-emerald-100 rounded-xl flex items-center justify-between hover:bg-slate-50 transition-all focus:outline-none">
              <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-emerald-50 text-emerald-600 rounded-full flex items-center justify-center shrink-0">
                  ${c.icon || ''}
                </div>
                <span class="text-lg font-bold text-slate-800">${c.title}</span>
              </div>
            </button>
          `;
        });
        html += `</div>`;
        app.innerHTML = html;

      } else if (currentView.page === 'chapter') {
        backBtn.classList.remove('hidden');
        const chapter = bridgeData.find(c => c.id === currentView.chapterId);
        headerTitle.innerText = chapter.title;
        
        let html = `<div class="animate-fade-in-left space-y-3">`;
        chapter.sections.forEach(s => {
          html += `
            <button onclick="navigateToSection('${chapter.id}', '${s.id}')" class="w-full p-4 bg-white shadow-sm border border-slate-200 rounded-xl flex items-center justify-between hover:bg-emerald-50 transition-all border-r-4 border-r-emerald-500 text-right">
              <span class="font-bold text-slate-800 text-base leading-snug">${s.title}</span>
            </button>
          `;
        });
        html += `</div>`;
        app.innerHTML = html;

      } else if (currentView.page === 'section') {
        backBtn.classList.remove('hidden');
        const chapter = bridgeData.find(c => c.id === currentView.chapterId);
        const section = chapter.sections.find(s => s.id === currentView.sectionId);
        headerTitle.innerText = section.title;

        let html = `<div class="animate-fade-in-left">`;

        if (section.subsections && section.subsections.length > 0) {
          section.subsections.forEach((sub, idx) => {
             html += `
              <details class="mb-3 bg-white shadow-sm border border-slate-200 rounded-xl overflow-hidden group">
                <summary class="p-4 font-bold cursor-pointer hover:bg-slate-50 transition-colors flex justify-between items-center text-slate-800 focus:outline-none">
                  <span>${sub.title}</span>
                  <span class="text-emerald-600 transition-transform group-open:rotate-45 text-2xl font-bold">+</span>
                </summary>
                <div class="p-4 border-t border-slate-100 bg-slate-50/50 text-sm text-slate-700 leading-relaxed">
                  ${sub.content}
                </div>
              </details>
             `;
          });
        } else if (section.content) {
          html += `<div class="bg-white p-5 rounded-xl shadow-sm border border-slate-200 text-sm text-slate-700 leading-relaxed">${section.content}</div>`;
        }

        html += `</div>`;
        app.innerHTML = html;
      }
    }

    document.addEventListener("DOMContentLoaded", render);
  </script>
</body>
</html>
